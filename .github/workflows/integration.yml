name: Integration

# Slow path: downloads ggml-tiny.en (~75 MB) + JFK audio fixture and runs a
# real end-to-end whisper.cpp transcription. Not gated on every PR; runs
# on manual dispatch and a weekly cron so upstream model/audio source rot
# is noticed within a week.

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "27.3"
  RUST_TOOLCHAIN: "1.85.0"

jobs:
  integration:
    name: End-to-end transcription
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Shared build env
        uses: ./.github/actions/setup
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          rust-toolchain: ${{ env.RUST_TOOLCHAIN }}
          cache-fixtures: "true"

      - name: Run integration tests
        run: task test:integration
