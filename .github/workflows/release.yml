name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g., v0.1.0)"
        required: true

permissions: {}

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.91.0"

jobs:
  detect:
    name: Resolve release target
    runs-on: ubuntu-24.04
    permissions:
      contents: read # read mix.exs / git history to resolve the release target
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-detect
      cancel-in-progress: false
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
      sha: ${{ steps.resolve.outputs.sha }}
      nif_version: ${{ steps.resolve.outputs.nif_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release target
        id: resolve
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            VERSION="${TAG#v}"
            SHOULD_RELEASE=true
          else
            VERSION="$(sed -n 's/^  @version "\([^"]*\)"$/\1/p' mix.exs | head -n1)"
            PREVIOUS_VERSION="$(git show HEAD^:mix.exs 2>/dev/null | sed -n 's/^  @version "\([^"]*\)"$/\1/p' | head -n1)"

            if [ -z "$VERSION" ]; then
              echo "Failed to read current mix.exs version" >&2
              exit 1
            fi

            TAG="v$VERSION"

            if [ "$VERSION" = "$PREVIOUS_VERSION" ]; then
              SHOULD_RELEASE=false
            else
              SHOULD_RELEASE=true
            fi
          fi

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          NIF_VERSION="$(sed -n 's/^[[:space:]]*nif_versions:[[:space:]]*\["\([^"]*\)"\].*$/\1/p' \
            lib/whisper_cpp/native.ex | head -n1)"
          if [ -z "$NIF_VERSION" ]; then
            echo "Failed to parse nif_versions from lib/whisper_cpp/native.ex" >&2
            exit 1
          fi

          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"
          echo "sha=$TRIGGER_SHA" >> "$GITHUB_OUTPUT"
          echo "nif_version=$NIF_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read # checkout the source ref to build NIF artifacts
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-${{ matrix.id }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 Linux: pure CPU (default)
          - id: x86_64-unknown-linux-gnu
            suffix: ""
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            lib_ext: so
            features: ""
            install_cuda: false
            install_rocm: false

          # x86_64 Linux: CUDA variant
          - id: x86_64-unknown-linux-gnu--cuda
            suffix: "--cuda"
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            lib_ext: so
            features: "cuda"
            install_cuda: true
            install_rocm: false

          # x86_64 Linux: ROCm / hipBLAS variant
          - id: x86_64-unknown-linux-gnu--hipblas
            suffix: "--hipblas"
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            lib_ext: so
            features: "hipblas"
            install_cuda: false
            install_rocm: true

          # aarch64 Linux: pure CPU
          - id: aarch64-unknown-linux-gnu
            suffix: ""
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            lib_ext: so
            features: ""
            install_cuda: false
            install_rocm: false

          # aarch64 Linux: CUDA variant (Grace/GH200-class hosts)
          - id: aarch64-unknown-linux-gnu--cuda
            suffix: "--cuda"
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            lib_ext: so
            features: "cuda"
            install_cuda: true
            install_rocm: false

          # Apple Silicon: Metal + CoreML
          # cargo emits .dylib on macOS; rustler_precompiled requests .so
          # for darwin targets (matches Explorer, Tokenizers convention).
          - id: aarch64-apple-darwin
            suffix: ""
            target: aarch64-apple-darwin
            runner: macos-15
            src_ext: dylib
            lib_ext: so
            features: "metal"
            install_cuda: false
            install_rocm: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.detect.outputs.sha }}
          persist-credentials: false

      # pinned toolchain installer keeps the Rust version and cross targets reproducible
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable # zizmor: ignore[superfluous-actions]
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake perl libclang-dev pkg-config

      - name: Install CUDA toolkit
        if: matrix.install_cuda
        env:
          ARCH: ${{ runner.arch == 'X64' && 'x86_64' || 'sbsa' }}
        run: |
          DISTRO=ubuntu2404
          KEYRING=cuda-keyring_1.1-1_all.deb
          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/${DISTRO}/${ARCH}/${KEYRING}"
          sudo dpkg -i "${KEYRING}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cuda-toolkit-12-6
          echo "PATH=/usr/local/cuda/bin:$PATH" >> "$GITHUB_ENV"

      - name: Install ROCm / hipBLAS toolkit
        if: matrix.install_rocm
        run: |
          # ROCm 7.2.3 / Ubuntu 24.04 (noble). Matches the .so versions
          # shipped by current nixpkgs and other distros that have moved
          # off ROCm 6.
          wget -q https://repo.radeon.com/amdgpu-install/7.2.3/ubuntu/noble/amdgpu-install_7.2.3.70203-1_all.deb
          sudo dpkg -i amdgpu-install_7.2.3.70203-1_all.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rocm-dev hipblas-dev rocblas-dev
          echo "PATH=/opt/rocm/bin:$PATH" >> "$GITHUB_ENV"
          echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "HIP_PATH=/opt/rocm" >> "$GITHUB_ENV"
          # Emit device code for the full RDNA 3 / RDNA 4 consumer line.
          # ggml's HIP backend defaults to an older arch list that omits
          # gfx1200 / gfx1201 (RX 9000-series, RDNA 4), so kernel launches
          # fail at runtime on those cards even though the .so loads and
          # hipBLAS reports the GPU. Both GPU_TARGETS (current ggml/llama
          # convention) and AMDGPU_TARGETS (legacy) are honoured by the
          # upstream CMake.
          AMDGPU_ARCHS="gfx1100;gfx1101;gfx1102;gfx1103;gfx1200;gfx1201"
          echo "GPU_TARGETS=$AMDGPU_ARCHS" >> "$GITHUB_ENV"
          echo "AMDGPU_TARGETS=$AMDGPU_ARCHS" >> "$GITHUB_ENV"

      # Cache only the cargo registry, not target/. Caching the native
      # build tree across releases is fragile: ggml's HIP backend reads
      # AMDGPU_TARGETS through CMake imported targets, and a stale build
      # tree from an earlier arch list silently keeps the old kernels
      # baked into the fatbin. Workflow-file hash is included so any
      # toolchain change cleanly invalidates downstream caches too.
      - name: Cargo cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: release-${{ matrix.id }}-${{ hashFiles('native/whisper_cpp_native/Cargo.lock', '.github/workflows/release.yml') }}

      - name: Build NIF
        working-directory: native/whisper_cpp_native
        env:
          FEATURES: ${{ matrix.features }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ -n "$FEATURES" ]; then
            cargo build --release --target "$TARGET" --features "$FEATURES"
          else
            cargo build --release --target "$TARGET"
          fi

      # Sanity check: a real hipBLAS build with the gfx1100-1201 arch
      # set embeds ~15 MiB of compressed device code. If the build
      # silently fell back to an empty arch list (legacy hipcc default
      # or a stale cmake state), the .hip_fatbin section shrinks to a
      # few hundred KB and kernel launches die at runtime. Fail the
      # release before publishing rather than ship a broken artefact.
      - name: Verify HIP fatbin includes device code
        if: matrix.install_rocm
        env:
          TARGET: ${{ matrix.target }}
        run: |
          SO="native/whisper_cpp_native/target/${TARGET}/release/libwhisper_cpp_native.so"
          SIZE_HEX=$(objdump -h "$SO" | awk '$2 == ".hip_fatbin" {print $3}')
          if [ -z "$SIZE_HEX" ]; then
            echo "::error::.hip_fatbin section missing from $SO"
            exit 1
          fi
          SIZE=$((16#$SIZE_HEX))
          echo "hip_fatbin size: $SIZE bytes"
          if [ "$SIZE" -lt 5242880 ]; then
            echo "::error::.hip_fatbin section is $SIZE bytes (< 5 MiB); arch list likely missing — refusing to publish"
            exit 1
          fi

      - name: Create tarball
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.detect.outputs.version }}
          NIF_VERSION: ${{ needs.detect.outputs.nif_version }}
          SRC_EXT: ${{ matrix.src_ext || matrix.lib_ext }}
          LIB_EXT: ${{ matrix.lib_ext }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          SRC_DIR="native/whisper_cpp_native/target/${TARGET}/release"
          SRC_NAME="libwhisper_cpp_native.${SRC_EXT}"
          LIB_NAME="libwhisper_cpp_native-v${VERSION}-nif-${NIF_VERSION}-${TARGET}${SUFFIX}.${LIB_EXT}"

          cp "${SRC_DIR}/${SRC_NAME}" "${SRC_DIR}/${LIB_NAME}"
          tar -czf "${LIB_NAME}.tar.gz" -C "${SRC_DIR}" "${LIB_NAME}"
          rm "${SRC_DIR}/${LIB_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nif-${{ matrix.id }}
          path: "*whisper_cpp_native-*.tar.gz"
          if-no-files-found: error

  tag:
    name: Create release tag
    runs-on: ubuntu-24.04
    needs: detect
    if: github.event_name == 'push' && needs.detect.outputs.should_release == 'true' && needs.detect.outputs.tag_exists != 'true'
    permissions:
      contents: write # create and push the release tag
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-tag
      cancel-in-progress: false
    steps:
      # this job pushes the release tag, so checkout credentials must persist
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # zizmor: ignore[artipacked]
        with:
          ref: ${{ needs.detect.outputs.sha }}
          fetch-depth: 0

      - name: Create and push release tag
        env:
          TAG: ${{ needs.detect.outputs.tag }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "$TAG"
          git push origin "$TAG"

  release:
    name: GitHub Release
    needs:
      - detect
      - build
      - tag
    if: always() && needs.detect.outputs.should_release == 'true' && needs.build.result == 'success' && (needs.tag.result == 'success' || needs.tag.result == 'skipped')
    runs-on: ubuntu-24.04
    permissions:
      contents: write # publish the GitHub release and upload assets
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-release
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nif-*
          merge-multiple: true
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum *.tar.gz | tee SHA256SUMS

      # one pinned step handles tag targeting, asset upload, and release notes
      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0 # zizmor: ignore[superfluous-actions]
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ needs.detect.outputs.sha }}
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
